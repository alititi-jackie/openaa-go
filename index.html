<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />

  <!-- Title & Meta（针对在美华人常搜关键词优化） -->
  <title>OpenAA · 美国华人生活入口 | 华人导航、DMV、找工作、二手</title>
  <meta name="description" content="OpenAA 为在美华人提供一站式中文导航与实用服务：DMV/移民/找工作/168招聘/二手市场/银行/生活资讯。覆盖纽约、洛杉矶、旧金山等城市，帮助在美华人快速获取本地服务与信息。" />
  <meta name="keywords" content="美国华人, 美华人, meihuaren, 华人OpenAA, 美国华人168, 华人导航, DMV, 移民服务, 找工作, 168招聘, 二手市场, 华人资讯, 在美生活, 华人社区" />
  <meta name="robots" content="index, follow" />
  <link rel="icon" href="./favicon.ico" sizes="any" />
  <link rel="shortcut icon" href="./favicon.ico" />
  <link rel="apple-touch-icon" href="./logo.png" />

  <style>
    :root {
      --bg: #ffffff;
      --text: #202124;
      --muted: #70757a;
      --line: #dfe1e5;
      --soft: #f1f3f4;
      --soft-hover: #e8eaed;
      --brand: #1a73e8;
      --shadow: 0 1px 6px rgba(32, 33, 36, 0.22);
      --content-width: 680px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      min-height: 100vh;
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      background: var(--bg);
      color: var(--text);
      font-family:
        Arial,
        "PingFang SC",
        "Microsoft YaHei",
        "Noto Sans SC",
        sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    button,
    input,
    select {
      font: inherit;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .topbar {
      min-height: 60px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 18px;
      padding: 0 24px;
      font-size: 13px;
      white-space: nowrap;
    }

    .topbar a:hover {
      text-decoration: underline;
    }

    .page {
      width: 100%;
      flex: 1;
      display: flex;
      justify-content: center;
      padding: clamp(54px, 10vh, 112px) 20px 40px;
    }

    .main {
      width: min(100%, var(--content-width));
      text-align: center;
    }

    .brand {
      margin: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      line-height: 1;
      user-select: none;
    }

    .brand-logo {
      width: clamp(48px, 7vw, 64px);
      height: clamp(48px, 7vw, 64px);
      display: block;
      object-fit: contain;
      border-radius: 50%;
    }

    .brand-name {
      font-size: clamp(42px, 7vw, 64px);
      font-weight: 700;
      letter-spacing: -2.4px;
    }

    .brand-open {
      color: #1769ff;
    }

    .brand-aa {
      color: #202124;
    }

    .tagline {
      margin: 12px 0 28px;
      color: var(--muted);
      font-size: 14px;
      letter-spacing: 0.2px;
    }

    .search-wrap {
      position: relative;
      width: 100%;
    }

    .search-box {
      width: 100%;
      min-height: 48px;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) 44px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: #fff;
      transition:
        border-color 0.18s ease,
        box-shadow 0.18s ease;
    }

    .search-box:hover,
    .search-box:focus-within {
      border-color: transparent;
      box-shadow: var(--shadow);
    }

    .engine-select-wrap {
      position: relative;
      display: flex;
      align-items: center;
      height: 100%;
      margin-left: 9px;
      padding-right: 5px;
    }

    .engine-select {
      height: 34px;
      max-width: 106px;
      padding: 0 27px 0 10px;
      border: 0;
      border-radius: 17px;
      outline: none;
      background: transparent;
      color: #3c4043;
      font-size: 13px;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
    }

    .engine-select:hover,
    .engine-select:focus {
      background: var(--soft);
    }

    .select-arrow {
      position: absolute;
      right: 13px;
      width: 7px;
      height: 7px;
      border-right: 1.5px solid #5f6368;
      border-bottom: 1.5px solid #5f6368;
      transform: rotate(45deg) translateY(-2px);
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      min-width: 0;
      height: 46px;
      padding: 0 8px;
      border: 0;
      outline: none;
      background: transparent;
      color: var(--text);
      font-size: 16px;
    }

    .search-input::placeholder {
      color: #9aa0a6;
    }

    .search-button {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      margin-right: 4px;
      padding: 0;
      border: 0;
      border-radius: 50%;
      background: transparent;
      color: #5f6368;
      cursor: pointer;
    }

    .search-button:hover,
    .search-button:focus-visible {
      background: var(--soft);
      outline: none;
    }

    .search-button svg {
      width: 21px;
      height: 21px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
    }

    .engine-tabs {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 5px 10px;
      margin-top: 15px;
    }

    .engine-tab {
      padding: 5px 7px;
      border: 0;
      border-radius: 13px;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      cursor: pointer;
    }

    .engine-tab:hover {
      background: var(--soft);
      color: var(--text);
    }

    .engine-tab[aria-pressed="true"] {
      color: var(--brand);
      font-weight: 600;
    }

    .shortcuts {
      display: grid;
      grid-template-columns: repeat(8, minmax(0, 1fr));
      gap: 8px;
      margin-top: 34px;
    }

    .shortcut {
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 9px;
      padding: 10px 4px 8px;
      border-radius: 12px;
      color: #3c4043;
      font-size: 13px;
      transition: background 0.15s ease;
    }

    .shortcut:hover,
    .shortcut:focus-visible {
      background: rgba(60, 64, 67, 0.08);
      outline: none;
    }

    .shortcut-icon {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: var(--soft);
      color: #5f6368;
    }

    .shortcut:hover .shortcut-icon {
      background: var(--soft-hover);
    }

    .shortcut-icon svg {
      width: 22px;
      height: 22px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .shortcut-label {
      width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .footer {
      min-height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 20px max(12px, env(safe-area-inset-bottom));
      color: #9aa0a6;
      font-size: 12px;
    }

    .noscript {
      max-width: 640px;
      margin: 10px auto;
      padding: 10px 14px;
      border-radius: 8px;
      background: #fff4e5;
      color: #8a4b08;
      font-size: 13px;
    }

    @media (max-width: 680px) {
      .topbar {
        min-height: 52px;
        padding: 0 16px;
        gap: 14px;
      }

      .page {
        align-items: flex-start;
        padding: clamp(56px, 10vh, 92px) 16px 26px;
      }

      .brand {
        gap: 10px;
      }

      .brand-name {
        letter-spacing: -1.8px;
      }

      .tagline {
        margin-top: 10px;
        margin-bottom: 24px;
      }

      .shortcuts {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        row-gap: 10px;
        margin-top: 27px;
      }
    }

    @media (max-width: 390px) {
      .page {
        padding-left: 12px;
        padding-right: 12px;
      }

      .engine-select {
        max-width: 92px;
        padding-left: 8px;
        padding-right: 23px;
      }

      .search-input {
        font-size: 15px;
      }

      .engine-tabs {
        gap: 4px 5px;
      }

      .engine-tab {
        padding-left: 6px;
        padding-right: 6px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        scroll-behavior: auto !important;
        transition: none !important;
      }
    }
  </style>
</head>

  <script>
    (() => {
      "use strict";

      const STORAGE_KEY = "openaa-go-search-engine";
      const form = document.getElementById("searchForm");
      const input = document.getElementById("searchInput");
      const select = document.getElementById("engineSelect");
      const tabs = Array.from(document.querySelectorAll(".engine-tab"));

      const engines = {
        google: {
          name: "Google",
          placeholder: "搜索网页或华人生活信息",
          buildUrl: (query) =>
            "https://www.google.com/search?q=" + encodeURIComponent(query)
        },
        bing: {
          name: "Bing",
          placeholder: "使用 Bing 搜索",
          buildUrl: (query) =>
            "https://www.bing.com/search?q=" + encodeURIComponent(query)
        },
        baidu: {
          name: "百度",
          placeholder: "使用百度搜索",
          buildUrl: (query) =>
            "https://www.baidu.com/s?wd=" + encodeURIComponent(query)
        },
        ai: {
          name: "AI 搜索",
          placeholder: "使用 AI 搜索",
          buildUrl: (query) =>
            "https://www.perplexity.ai/search?q=" + encodeURIComponent(query)
        },
        openaa: {
          name: "OpenAA",
          placeholder: "搜索 OpenAA 华人生活信息",
          buildUrl: (query) =>
            "https://openaa.com/search?q=" + encodeURIComponent(query)
        }
      };

      function normalizeEngine(value) {
        return Object.prototype.hasOwnProperty.call(engines, value)
          ? value
          : "google";
      }

      function setEngine(engineKey, focusInput = false) {
        const key = normalizeEngine(engineKey);
        select.value = key;
        input.placeholder = engines[key].placeholder;

        tabs.forEach((tab) => {
          tab.setAttribute(
            "aria-pressed",
            tab.dataset.engine === key ? "true" : "false"
          );
        });

        try {
          localStorage.setItem(STORAGE_KEY, key);
        } catch (_) {
          // localStorage unavailable; page remains fully usable.
        }

        if (focusInput) {
          input.focus();
        }
      }

      function getSavedEngine() {
        try {
          return normalizeEngine(localStorage.getItem(STORAGE_KEY));
        } catch (_) {
          return "google";
        }
      }

      function looksLikeUrl(value) {
        return /^(https?:\/\/)/i.test(value) ||
          /^(localhost)(:\d+)?(\/.*)?$/i.test(value) ||
          /^[a-z0-9-]+(\.[a-z0-9-]+)+([/:?#].*)?$/i.test(value);
      }

      function toUrl(value) {
        return /^https?:\/\//i.test(value) ? value : "https://" + value;
      }

      select.addEventListener("change", () => setEngine(select.value, true));

      tabs.forEach((tab) => {
        tab.addEventListener("click", () => {
          setEngine(tab.dataset.engine, true);
        });
      });

      form.addEventListener("submit", (event) => {
        event.preventDefault();

        const query = input.value.trim();
        if (!query) {
          input.focus();
          return;
        }

        let targetUrl;
        if (looksLikeUrl(query)) {
          targetUrl = toUrl(query);
        } else {
          const key = normalizeEngine(select.value);
          targetUrl = engines[key].buildUrl(query);
        }

        const opened = window.open(targetUrl, "_blank", "noopener,noreferrer");
        if (opened) {
          opened.opener = null;
        }
      });

      setEngine(getSavedEngine());
    })();
  </script>
